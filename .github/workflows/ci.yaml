name: CI - Build, Test, Push Image

on:
  push:
    branches: [main]

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/mlops-sim
  ARTIFACT_DIR: artifacts

jobs:
  build-test-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with: {python-version: "3.11"}

      - name: Install deps & smoke-test pipeline scripts
        run: |
          pip install -q pandas numpy scikit-learn joblib pyarrow
          python data/generate_dataset.py
          python feature-engineering/feature_engineering.py
          python training/train.py
          python evaluation/evaluate.py

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

      # NOTE: in this local-kind simulation, Argo CD does NOT auto-pull this
      # new tag (that needs Argo Image Updater, a separate component).
      # For the simulation: after this step, run `kind load docker-image`
      # locally and let Argo CD's selfHeal just keep manifests in sync.
      # This mirrors real setups where CI builds/pushes and a separate
      # GitOps/image-update controller bumps the deployed tag.

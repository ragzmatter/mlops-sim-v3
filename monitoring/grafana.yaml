# Grafana — reads from Prometheus, port 30030
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: mlops-monitoring
spec:
  replicas: 2
  selector: {matchLabels: {app: grafana}}
  template:
    metadata: {labels: {app: grafana}}
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:latest
          env:
            - {name: GF_SECURITY_ADMIN_PASSWORD, value: admin}
            - {name: GF_AUTH_ANONYMOUS_ENABLED, value: "true"}
          ports: [{containerPort: 3000}]
---
apiVersion: v1
kind: Service
metadata:
  name: grafana-svc
  namespace: mlops-monitoring
spec:
  type: NodePort
  selector: {app: grafana}
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30030
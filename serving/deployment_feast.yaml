apiVersion: apps/v1
kind: Deployment
metadata:
  name: model-serving
  namespace: mlops-serving
  labels: {app: model-serving}
spec:
  replicas: 2
  selector:
    matchLabels: {app: model-serving}
  template:
    metadata:
      labels: {app: model-serving}
    spec:
      containers:
        - name: serving
          image: mlops-sim:local
          # app_feast.py replaces app.py — uses Feast for feature lookup
          command: ["uvicorn", "serving.app_feast:app", "--host", "0.0.0.0", "--port", "8000"]
          workingDir: /
          env:
            - {name: ARTIFACT_DIR, value: /mnt/artifacts}
            - {name: FEAST_REPO,   value: /app/feature_repo}
          ports: [{containerPort: 8000}]
          volumeMounts: [{name: artifacts, mountPath: /mnt/artifacts}]
          readinessProbe:
            httpGet: {path: /health, port: 8000}
            initialDelaySeconds: 8
          livenessProbe:
            httpGet: {path: /health, port: 8000}
            initialDelaySeconds: 15
      volumes:
        - name: artifacts
          persistentVolumeClaim: {claimName: artifacts-pvc}
---
apiVersion: v1
kind: Service
metadata:
  name: model-serving-svc
  namespace: mlops-serving
spec:
  type: NodePort
  selector: {app: model-serving}
  ports:
    - port: 80
      targetPort: 8000
      nodePort: 30080

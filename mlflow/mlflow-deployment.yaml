apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  namespace: mlops-training
spec:
  replicas: 1
  selector: {matchLabels: {app: mlflow}}
  template:
    metadata: {labels: {app: mlflow}}
    spec:
      containers:
        - name: mlflow
          image: ghcr.io/mlflow/mlflow:latest
          command:
            - mlflow
            - server
            - --host=0.0.0.0
            - --port=5000
            - --backend-store-uri=sqlite:////mnt/artifacts/mlflow
            - --default-artifact-root=/mnt/artifacts/mlflow-artifacts
          ports: [{containerPort: 5000}]
          volumeMounts: [{name: artifacts, mountPath: /mnt/artifacts}]
      volumes:
        - name: artifacts
          persistentVolumeClaim: {claimName: artifacts-pvc}
---
apiVersion: v1
kind: Service
metadata:
  name: mlflow-svc
  namespace: mlops-training
spec:
  type: NodePort
  selector: {app: mlflow}
  ports:
    - port: 5000
      targetPort: 5000
      nodePort: 30500
